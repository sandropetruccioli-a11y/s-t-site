<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Titolo articolo</title>
<style>
:root {
  --bg: #f4f3ef;
  --text: #1f1f1f;
  --muted: #24535d;
  --accent: #0a4652;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  font-weight: 500;
  line-height: 1.65;
}
.container {
  max-width: 760px;
  margin: 0 auto;
  padding: 22px 16px 32px;
}
.back-link {
  text-decoration: none;
  color: var(--accent);
  font-weight: 700;
}
.article-date {
  margin-top: 14px;
  font-size: 0.78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
}
h1 {
  margin: 8px 0 14px;
  font-size: 1.28rem;
  line-height: 1.3;
  color: var(--accent);
}
.article-text p {
  margin: 0 0 1em;
}
@media (min-width: 700px) {
  .container { padding: 36px 28px 42px; }
  h1 { font-size: 1.72rem; }
}
</style>
</head>
<body>
<div class="container">
  <a class="back-link" href="../index.html">← Torna agli articoli</a>
  <div class="article-date">GG mese AAAA</div>
  <h1>Titolo articolo</h1>
  <div class="article-text">
    <p>Paragrafo 1.</p>
    <p>Paragrafo 2.</p>
    <p>Paragrafo 3.</p>
  </div>
</div>
</body>
</html>
